<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlighter Pro - Instalasi Otomatis</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0c1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(20,25,45,0.9);
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
            border: 1px solid #ff6b4a;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff6b4a, #ff8a6a);
            color: #0a0c1a;
            font-weight: bold;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            margin: 20px 0;
            transition: 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff6b4a;
        }
        .note {
            font-size: 14px;
            color: #aaaac0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Highlighter Pro</h1>
        <p>Klik tombol di bawah untuk menginstal skrip secara otomatis ke Tampermonkey.</p>
        <a href="https://raw.githubusercontent.com/ranjit230422-eng/detektor/main/ane1.user.js" class="btn">🚀 Pasang Sekarang</a>
        <p class="note">Pastikan Tampermonkey sudah terpasang di browser Anda.</p>
    </div>
</body>
</html>
