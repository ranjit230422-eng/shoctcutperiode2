<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Parlay Calculator - Barcelona Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --barca-blue: #004D98;
            --barca-garnet: #A50044;
            --barca-yellow: #FFED00;
            --barca-red: #DB0030;
            --success: #2ecc71;
            --info: #3498db;
            --warning: #f39c12;
            --error: #e74c3c;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --glass: rgba(0, 20, 40, 0.65);
            --border: rgba(255, 255, 255, 0.12);
            --shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4);
        }
        body { font-family: 'Inter', sans-serif; background: #0a0c15; color: var(--text); line-height: 1.5; min-height: 100vh; overflow-x: hidden; }
        .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; object-fit: cover; filter: brightness(0.85) saturate(1.1); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(0, 40, 70, 0.5), rgba(0, 0, 0, 0.75)); z-index: -1; }
        .floating-ball { position: fixed; bottom: 20px; right: 20px; font-size: 3.5rem; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4)); animation: floatBall 4s ease-in-out infinite; pointer-events: none; z-index: 0; opacity: 0.5; }
        @keyframes floatBall { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(15deg); } }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .particle { position: absolute; background: rgba(255, 237, 0, 0.4); border-radius: 50%; animation: particleFloat linear infinite; }
        @keyframes particleFloat { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.6; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }
        .container { max-width: 950px; margin: 0 auto; padding: 30px 24px 60px; position: relative; z-index: 2; }
        .header { text-align: center; margin-bottom: 45px; position: relative; }
        .badge { display: inline-flex; align-items: center; gap: 10px; background: linear-gradient(135deg, rgba(0,77,152,0.8), rgba(165,0,68,0.8)); backdrop-filter: blur(8px); border: 1px solid var(--barca-yellow); padding: 8px 20px; border-radius: 60px; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; color: var(--barca-yellow); margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .header h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #fff, var(--barca-yellow), var(--barca-red)); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; animation: shimmer 3s ease infinite; letter-spacing: -1px; }
        @keyframes shimmer { 0%, 100% { background-position: 0% center; } 50% { background-position: 200% center; } }
        .header p { color: var(--text-muted); font-size: 0.85rem; letter-spacing: 2px; margin-top: 8px; }
        .match-card { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 32px; padding: 24px; margin-bottom: 24px; transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); box-shadow: var(--shadow); }
        .match-card:hover { transform: translateY(-4px); border-color: rgba(255, 237, 0, 0.3); background: rgba(0, 35, 60, 0.7); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .match-number { font-weight: 700; font-size: 0.8rem; background: rgba(255,237,0,0.15); padding: 4px 12px; border-radius: 40px; color: var(--barca-yellow); }
        .live-tag { display: flex; align-items: center; gap: 6px; background: rgba(231,76,60,0.2); padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; color: #ff7675; }
        .live-dot { width: 8px; height: 8px; background: #e74c3c; border-radius: 50%; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
        .btn-remove { background: rgba(231,76,60,0.2); border: none; color: #ff7675; width: 30px; height: 30px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .btn-remove:hover { background: #e74c3c; color: white; transform: scale(1.05); }
        .teams-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: center; background: rgba(0,0,0,0.3); border-radius: 24px; padding: 20px; margin-bottom: 24px; }
        .team-box { text-align: center; }
        .team-label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1.5px; margin-bottom: 8px; }
        .team-input { width: 100%; background: rgba(0,0,0,0.5); border: 1.5px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 12px 12px; color: white; font-weight: 600; text-align: center; font-size: 0.9rem; transition: 0.2s; }
        .team-input:focus { outline: none; border-color: var(--barca-yellow); box-shadow: 0 0 12px rgba(255,237,0,0.3); }
        .vs { font-weight: 800; font-size: 1.3rem; color: var(--barca-yellow); text-shadow: 0 0 8px rgba(255,237,0,0.5); }
        .score-area { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; background: rgba(0,0,0,0.3); border-radius: 28px; padding: 16px; }
        .score-input { width: 80px; text-align: center; font-size: 2rem; font-weight: 800; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,237,0,0.4); border-radius: 20px; padding: 8px; color: var(--barca-yellow); font-family: 'JetBrains Mono', monospace; }
        .score-input:focus { outline: none; border-color: var(--barca-yellow); box-shadow: 0 0 12px rgba(255,237,0,0.3); }
        .score-sep { font-size: 2rem; font-weight: 700; color: rgba(255,255,255,0.3); }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }
        .field input, .field select { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 18px; padding: 12px 14px; color: white; font-weight: 500; transition: 0.2s; }
        .field input:focus, .field select:focus { border-color: var(--barca-yellow); outline: none; box-shadow: 0 0 8px rgba(255,237,0,0.3); }
        .btn-add { width: 100%; background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.25); border-radius: 40px; padding: 16px; font-weight: 700; font-size: 1rem; color: rgba(255,255,255,0.8); cursor: pointer; transition: 0.25s; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-add:hover { background: rgba(255,255,255,0.12); border-color: var(--barca-yellow); color: white; transform: translateY(-2px); }
        .stake-panel { background: linear-gradient(115deg, rgba(0,77,152,0.4), rgba(165,0,68,0.4)); backdrop-filter: blur(12px); border-radius: 32px; padding: 20px 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; border: 1px solid var(--barca-yellow); margin: 28px 0; }
        .stake-label { font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .stake-input { background: rgba(0,0,0,0.5); border-radius: 60px; padding: 8px 20px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--barca-yellow); }
        .stake-input span { font-weight: 800; color: var(--barca-yellow); }
        .stake-input input { background: transparent; border: none; color: white; font-size: 1.3rem; font-weight: 700; width: 130px; text-align: right; font-family: monospace; }
        .action-bar { display: flex; gap: 16px; margin-bottom: 40px; }
        .btn { flex: 1; padding: 16px; border-radius: 60px; font-weight: 800; border: none; cursor: pointer; font-size: 1rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: linear-gradient(95deg, var(--barca-yellow), #ffb347); color: #1a1a2e; box-shadow: 0 8px 20px rgba(255,237,0,0.3); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,237,0,0.4); }
        .btn-reset { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: #ff8a7a; }
        .btn-reset:hover { background: rgba(231,76,60,0.3); transform: translateY(-2px); }
        .result-card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 36px; border: 1px solid rgba(255,237,0,0.3); padding: 32px; margin-top: 30px; display: none; animation: fadeUp 0.5s ease; }
        .result-card.show { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
        .result-header { font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 2px solid rgba(255,237,0,0.3); }
        .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: rgba(0,0,0,0.4); border-radius: 24px; padding: 18px 12px; text-align: center; transition: 0.2s; }
        .stat-card:hover { background: rgba(0,0,0,0.6); transform: translateY(-3px); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }
        .stat-value { font-size: 1.4rem; font-weight: 800; font-family: monospace; margin-top: 8px; }
        .detail-panel { background: rgba(0,0,0,0.35); border-radius: 28px; padding: 20px; margin: 20px 0; }
        .copy-area { background: #0a0f1ad9; border-radius: 20px; padding: 18px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; white-space: pre-wrap; max-height: 280px; overflow-y: auto; border: 1px solid rgba(46,204,113,0.3); color: #2ecc71; }
        .btn-copy { background: linear-gradient(95deg, #2ecc71, #27ae60); border: none; border-radius: 40px; padding: 14px 28px; font-weight: 700; color: white; margin-top: 16px; cursor: pointer; transition: 0.2s; }
        .btn-copy:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .footer { text-align: center; margin-top: 50px; font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
        @media (max-width: 700px) {
            .container { padding: 20px 16px; }
            .teams-row { grid-template-columns: 1fr; gap: 12px; }
            .vs { transform: rotate(90deg); margin: 8px 0; }
            .settings-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .stake-panel { flex-direction: column; align-items: stretch; }
            .action-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <img class="bg-image" src="https://i.postimg.cc/qvV26FYB/glowing-barcelona-logo-on-field-dmsakbsxevetu817.jpg" alt="Camp Nou">
    <div class="overlay"></div>
    <div class="floating-ball">⚽</div>
    <div class="particles" id="particles"></div>
    <div class="confetti-layer" id="confetti" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999"></div>
    <div id="toast" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#1a2a1f;border:1px solid #ffed00;padding:12px 24px;border-radius:40px;color:#ffed00;z-index:10000;transition:0.3s;font-weight:600;"></div>

    <div class="container">
        <div class="header">
            <div class="badge">CAMP NOU · BARCA EDITION</div>
            <h1>PARLAY <span style="background:linear-gradient(135deg,#FFED00,#DB0030);-webkit-background-clip:text;background-clip:text;color:transparent;">CALCULATOR</span></h1>
            <p>Hitung Parlay & Single Bet • Odds Minus/Plus • Vooran Akurat</p>
        </div>

        <div id="cardsContainer"></div>
        <button class="btn-add" id="addBtn">+ Tambah Pertandingan</button>

        <div class="stake-panel">
            <div class="stake-label">Modal Taruhan</div>
            <div class="stake-input">
                <span>Rp</span>
                <input type="number" id="stake" value="500000" min="1000" step="1000">
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary" id="hitBtn">HITUNG SEKARANG</button>
            <button class="btn btn-reset" id="resetBtn">Reset Semua</button>
        </div>

        <div class="result-card" id="resultBox">
            <div class="result-header" id="resultTitle">HASIL PERHITUNGAN</div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label">Total Odds</div><div class="stat-value" id="resOdds">0.0000</div></div>
                <div class="stat-card"><div class="stat-label">Payout</div><div class="stat-value" id="resPayout">Rp 0</div></div>
                <div class="stat-card"><div class="stat-label">Profit</div><div class="stat-value" id="resProfit">Rp 0</div></div>
                <div class="stat-card"><div class="stat-label">Stake</div><div class="stat-value" id="resStake">Rp 0</div></div>
            </div>
            <div class="detail-panel" id="stepsDetail"></div>
            <div class="copy-area" id="copyArea"></div>
            <button class="btn-copy" id="copyBtn">COPY HASIL KE MEMBER</button>
        </div>
        <div class="footer">Stadium Elite · Barcelona Edition | Perhitungan Akurat Berdasarkan Skor & Voor</div>
    </div>

    <script>
        (function(){
            const container = document.getElementById('particles');
            for(let i=0;i<40;i++){
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = 2+Math.random()*5;
                p.style.width = size+'px';
                p.style.height = size+'px';
                p.style.left = Math.random()*100+'%';
                p.style.animationDuration = 8+Math.random()*15+'s';
                p.style.animationDelay = Math.random()*10+'s';
                p.style.opacity = 0.2+Math.random()*0.5;
                container.appendChild(p);
            }
        })();

        function showToast(msg){
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(()=>{
                toast.style.transform = 'translateX(-50%) translateY(100px)';
            },2500);
        }

        function showConfetti(){
            const conf = document.getElementById('confetti');
            conf.innerHTML = '';
            const colors = ['#FFED00','#A50044','#004D98','#DB0030','#2ecc71','#fff'];
            for(let i=0;i<120;i++){
                const c = document.createElement('div');
                c.style.position = 'absolute';
                c.style.width = 6+Math.random()*10+'px';
                c.style.height = 6+Math.random()*10+'px';
                c.style.background = colors[Math.floor(Math.random()*colors.length)];
                c.style.borderRadius = Math.random()>0.5?'50%':'2px';
                c.style.left = Math.random()*100+'%';
                c.style.top = '-10px';
                c.style.opacity = '0.8';
                c.style.animation = `confettiFall ${2+Math.random()*3}s linear forwards`;
                conf.appendChild(c);
            }
            setTimeout(()=>conf.innerHTML='',4000);
        }
        const style = document.createElement('style');
        style.textContent = `@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}`;
        document.head.appendChild(style);

        let cardCounter = 0;
        const defaultCards = [
            { home:"Uruguay", away:"Ghana", hs:2, as:0, line:"-0.75", odds:-1.50, type:"ah", side:"home" },
            { home:"Brazil", away:"Argentina", hs:1, as:1, line:"0", odds:-1.18, type:"ah", side:"home" },
            { home:"Portugal", away:"Spain", hs:2, as:1, line:"", odds:2.28, type:"1x2", side:"home" }
        ];

        function addCard(data=null){
            cardCounter++;
            const d = data || { home:"", away:"", hs:0, as:0, line:"", odds:1.90, type:"ah", side:"home" };
            const html = `
                <div class="match-card" data-id="${cardCounter}">
                    <div class="card-header">
                        <span class="match-number">MATCH ${cardCounter}</span>
                        <div style="display:flex;gap:12px;">
                            <div class="live-tag"><span class="live-dot"></span> LIVE</div>
                            <button class="btn-remove" onclick="removeCard(this)">X</button>
                        </div>
                    </div>
                    <div class="teams-row">
                        <div class="team-box"><div class="team-label">HOME</div><input type="text" class="team-input card-home" value="${escapeHtml(d.home)}" placeholder="Home" oninput="updateSide(this)"></div>
                        <div class="vs">VS</div>
                        <div class="team-box"><div class="team-label">AWAY</div><input type="text" class="team-input card-away" value="${escapeHtml(d.away)}" placeholder="Away" oninput="updateSide(this)"></div>
                    </div>
                    <div class="score-area">
                        <input type="number" class="score-input home-score" value="${d.hs}" min="0">
                        <span class="score-sep">—</span>
                        <input type="number" class="score-input away-score" value="${d.as}" min="0">
                    </div>
                    <div class="settings-grid">
                        <div class="field"><label>Jenis Taruhan</label><select class="card-type"><option value="ah" ${d.type==='ah'?'selected':''}>Asian Handicap</option><option value="ou" ${d.type==='ou'?'selected':''}>Over/Under</option><option value="1x2" ${d.type==='1x2'?'selected':''}>1X2</option></select></div>
                        <div class="field line-field"><label>${d.type==='ou'?'Line O/U':'Vooran'}</label><input type="text" class="card-line" value="${d.line}" placeholder="-0.5"></div>
                        <div class="field"><label>Pilihan</label><select class="card-side"></select></div>
                        <div class="field"><label>Odds</label><input type="number" class="card-odds" value="${d.odds}" step="0.01"></div>
                    </div>
                </div>
            `;
            document.getElementById('cardsContainer').insertAdjacentHTML('beforeend',html);
            const newCard = document.querySelector('.match-card:last-child');
            updateSide(newCard.querySelector('.card-home'));
            const typeSel = newCard.querySelector('.card-type');
            typeSel.addEventListener('change',function(){ toggleTypeInCard(this.closest('.match-card')); });
            toggleTypeInCard(newCard);
        }

        function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);}
        function removeCard(btn){ btn.closest('.match-card').remove(); reindex(); }
        function reindex(){ document.querySelectorAll('.match-card').forEach((c,i)=>{ c.querySelector('.match-number').innerText = `MATCH ${i+1}`; }); }
        function updateSide(inp){
            const card = inp.closest('.match-card');
            const home = card.querySelector('.card-home').value||'Home';
            const away = card.querySelector('.card-away').value||'Away';
            const type = card.querySelector('.card-type').value;
            const sideSel = card.querySelector('.card-side');
            if(type==='1x2') sideSel.innerHTML = `<option value="home">${home}</option><option value="away">${away}</option><option value="draw">Draw</option>`;
            else if(type==='ah') sideSel.innerHTML = `<option value="home">${home}</option><option value="away">${away}</option>`;
            else sideSel.innerHTML = `<option value="over">Over</option><option value="under">Under</option>`;
        }
        function toggleTypeInCard(card){
            const type = card.querySelector('.card-type').value;
            const lineField = card.querySelector('.line-field');
            if(type==='1x2') lineField.style.display = 'none';
            else { lineField.style.display = 'flex'; lineField.querySelector('label').innerText = type==='ou'?'Line O/U':'Vooran'; }
            updateSide(card.querySelector('.card-home'));
        }

        // ========== PERHITUNGAN YANG BENAR ==========
        function calcAH(home, away, line, side){
            let eff = (side==='away' ? -line : line);
            let diff = home - away + eff;
            const isQuarter = Math.abs(line*2)%1 !== 0;
            if(!isQuarter){
                if(diff>0) return {status:'WIN', desc:'menang penuh', factor:1};
                if(diff<0) return {status:'LOSE', desc:'kalah', factor:0};
                return {status:'PUSH', desc:'Push', factor:1};
            }
            const low = Math.floor(line*2)/2, high = Math.ceil(line*2)/2;
            const eLow = side==='away' ? -low : low, eHigh = side==='away' ? -high : high;
            const dLow = home - away + eLow, dHigh = home - away + eHigh;
            const rL = dLow>0?'W':(dLow<0?'L':'P'), rH = dHigh>0?'W':(dHigh<0?'L':'P');
            if(rL==='W' && rH==='W') return {status:'WIN', desc:'menang penuh', factor:1};
            if(rL==='L' && rH==='L') return {status:'LOSE', desc:'kalah', factor:0};
            if(rL==='P' && rH==='P') return {status:'PUSH', desc:'Push', factor:1};
            if((rL==='W' && rH==='P')||(rL==='P' && rH==='W')) return {status:'HALF_WIN', desc:'menang setengah', factor:0.5};
            if((rL==='L' && rH==='P')||(rL==='P' && rH==='L')) return {status:'HALF_LOSE', desc:'kalah setengah', factor:0.5};
            return {status:'PUSH', desc:'Push', factor:1};
        }
        function calc12(home, away, side){
            const diff = home-away;
            if(side==='home') return diff>0?{status:'WIN',desc:'menang penuh',factor:1}:diff<0?{status:'LOSE',desc:'kalah',factor:0}:{status:'PUSH',desc:'Push',factor:1};
            if(side==='away') return diff<0?{status:'WIN',desc:'menang penuh',factor:1}:diff>0?{status:'LOSE',desc:'kalah',factor:0}:{status:'PUSH',desc:'Push',factor:1};
            return diff===0?{status:'WIN',desc:'menang penuh',factor:1}:{status:'LOSE',desc:'kalah',factor:0};
        }
        function calcOU(total, line, side){
            const isQuarter = Math.abs(line*2)%1 !== 0;
            if(!isQuarter){
                if(side==='over') return total>line?{status:'WIN',desc:'menang penuh',factor:1}:total<line?{status:'LOSE',desc:'kalah',factor:0}:{status:'PUSH',desc:'Push',factor:1};
                return total<line?{status:'WIN',desc:'menang penuh',factor:1}:total>line?{status:'LOSE',desc:'kalah',factor:0}:{status:'PUSH',desc:'Push',factor:1};
            }
            const low = Math.floor(line*2)/2, high = Math.ceil(line*2)/2;
            const rL = side==='over'?(total>low?'W':total<low?'L':'P'):(total<low?'W':total>low?'L':'P');
            const rH = side==='over'?(total>high?'W':total<high?'L':'P'):(total<high?'W':total>high?'L':'P');
            if(rL==='W' && rH==='W') return {status:'WIN',desc:'menang penuh',factor:1};
            if(rL==='L' && rH==='L') return {status:'LOSE',desc:'kalah',factor:0};
            if(rL==='P' && rH==='P') return {status:'PUSH',desc:'Push',factor:1};
            if((rL==='W' && rH==='P')||(rL==='P' && rH==='W')) return {status:'HALF_WIN',desc:'menang setengah',factor:0.5};
            return {status:'HALF_LOSE',desc:'kalah setengah',factor:0.5};
        }

        function hitungSekarang(){
            const cards = document.querySelectorAll('.match-card');
            if(cards.length===0){ alert('Tambahkan minimal 1 pertandingan'); return; }
            const stake = parseFloat(document.getElementById('stake').value) || 0;
            let details = [];
            for(let card of cards){
                const home = card.querySelector('.card-home').value||'Home';
                const away = card.querySelector('.card-away').value||'Away';
                const hs = parseInt(card.querySelector('.home-score').value)||0;
                const as = parseInt(card.querySelector('.away-score').value)||0;
                const type = card.querySelector('.card-type').value;
                let lineRaw = card.querySelector('.card-line').value;
                if(type==='ou' && !lineRaw) lineRaw='2.5';
                if(type==='ah' && !lineRaw) lineRaw='0';
                const line = parseFloat(lineRaw)||0;
                const side = card.querySelector('.card-side').value;
                const rawOdds = parseFloat(card.querySelector('.card-odds').value)||1.0;
                const decOdds = rawOdds<0 ? 1+(1/Math.abs(rawOdds)) : rawOdds;
                let res;
                if(type==='ah') res = calcAH(hs,as,line,side);
                else if(type==='1x2') res = calc12(hs,as,side);
                else res = calcOU(hs+as,line,side);
                let effOdds = 1;
                if(res.status==='WIN') effOdds = decOdds;
                else if(res.status==='LOSE'){ effOdds=0; }
                else if(res.status==='PUSH') effOdds=1;
                else if(res.status==='HALF_WIN') effOdds = 1+(decOdds-1)*0.5;
                else if(res.status==='HALF_LOSE') effOdds=0.5;
                details.push({home,away,hs,as,type,line,side,rawOdds,decOdds,res,effOdds});
            }
            let totalOdds = 1;
            for(let d of details){
                if(d.res.status==='LOSE'){ totalOdds=0; break; }
                totalOdds *= d.effOdds;
            }
            let payout = stake * totalOdds;
            let profit = payout - stake;
            
            // ========== OUTPUT TEKS SESUAI CONTOH (TANPA EMOJI) ==========
            let isSingle = cards.length===1;
            let output = '';
            if(isSingle){
                const d = details[0];
                const sideName = d.type==='ah' ? (d.side==='home' ? d.home : d.away) : 
                                 (d.type==='1x2' ? (d.side==='home' ? d.home : (d.side==='away' ? d.away : 'Draw')) : 
                                 (d.side==='over' ? 'Over' : 'Under'));
                const voorText = (d.type==='ah' || d.type==='ou') ? d.line : '';
                // Header
                output = `=== HASIL SINGLE BET ===\n${d.home} vs ${d.away}\nPilihan: ${sideName} ${voorText}\nOdds: ${d.rawOdds.toFixed(2)}\nTaruhan: Rp ${stake.toLocaleString('id-ID')}\nSkor akhir: ${d.hs} - ${d.as}\n\n`;
                
                if(d.res.status === 'WIN'){
                    if(d.rawOdds < 0){
                        const absOdds = Math.abs(d.rawOdds);
                        const totalBayar = stake * absOdds;
                        const keuntungan = stake;
                        const totalKembali = totalBayar + keuntungan;
                        const vooranNilai = Math.abs(d.line);
                        const lawanVoor = (d.side === 'home' ? d.away : d.home);
                        output += `Anda MENANG PENUH\n\n`;
                        output += `Vooran ${vooranNilai} (${vooranNilai}) untuk ${lawanVoor}\n`;
                        output += `Odds MINUS ${d.rawOdds.toFixed(2)} → anda membayar lebih:\n`;
                        output += `${stake.toLocaleString('id-ID')} x ${absOdds.toFixed(2)} = ${totalBayar.toLocaleString('id-ID')}\n`;
                        output += `Karena menang, anda mendapatkan:\n`;
                        output += `Keuntungan = ${keuntungan.toLocaleString('id-ID')}\n`;
                        output += `Total diterima = ${totalKembali.toLocaleString('id-ID')}`;
                        payout = totalKembali;
                        profit = keuntungan;
                    } else {
                        const keuntungan = stake * d.rawOdds;
                        const totalKembali = stake + keuntungan;
                        output += `Anda MENANG PENUH\n\n`;
                        output += `Odds PLUS ${d.rawOdds.toFixed(2)}:\n`;
                        output += `Keuntungan = ${keuntungan.toLocaleString('id-ID')}\n`;
                        output += `Total diterima = ${totalKembali.toLocaleString('id-ID')}`;
                        payout = totalKembali;
                        profit = keuntungan;
                    }
                } 
                else if(d.res.status === 'LOSE'){
                    if(d.rawOdds < 0){
                        const totalBayar = stake * Math.abs(d.rawOdds);
                        output += `Anda KALAH\n\n`;
                        output += `Kerugian = ${totalBayar.toLocaleString('id-ID')}`;
                        profit = -totalBayar;
                        payout = 0;
                    } else {
                        output += `Anda KALAH\n\n`;
                        output += `Kerugian = ${stake.toLocaleString('id-ID')}`;
                        profit = -stake;
                        payout = 0;
                    }
                }
                else if(d.res.status === 'PUSH'){
                    output += `Hasil PUSH (SERI)\n\n`;
                    output += `Modal dikembalikan = ${stake.toLocaleString('id-ID')}`;
                    profit = 0;
                    payout = stake;
                }
                else if(d.res.status === 'HALF_WIN'){
                    if(d.rawOdds < 0){
                        const absOdds = Math.abs(d.rawOdds);
                        const totalBayar = stake * absOdds;
                        const keuntunganFull = stake; // keuntungan jika menang penuh
                        const keuntunganSetengah = keuntunganFull / 2;
                        const totalKembali = totalBayar + keuntunganSetengah;
                        const vooranNilai = Math.abs(d.line);
                        const lawanVoor = (d.side === 'home' ? d.away : d.home);
                        output += `Anda MENANG SETENGAH (1/2)\n\n`;
                        output += `Vooran ${vooranNilai} (${vooranNilai}) untuk ${lawanVoor}\n`;
                        output += `Odds MINUS ${d.rawOdds.toFixed(2)} → anda membayar lebih:\n`;
                        output += `${stake.toLocaleString('id-ID')} x ${absOdds.toFixed(2)} = ${totalBayar.toLocaleString('id-ID')}\n`;
                        output += `Karena menang setengah, anda mendapatkan:\n`;
                        output += `Keuntungan = ${keuntunganSetengah.toLocaleString('id-ID')}\n`;
                        output += `Total diterima = ${totalKembali.toLocaleString('id-ID')}`;
                        payout = totalKembali;
                        profit = keuntunganSetengah;
                    } else {
                        const keuntunganFull = stake * d.rawOdds;
                        const keuntunganSetengah = keuntunganFull / 2;
                        const totalKembali = stake + keuntunganSetengah;
                        output += `Anda MENANG SETENGAH (1/2)\n\n`;
                        output += `Odds PLUS ${d.rawOdds.toFixed(2)}:\n`;
                        output += `Keuntungan penuh jika menang full = ${keuntunganFull.toLocaleString('id-ID')}\n`;
                        output += `Karena menang setengah, keuntungan = ${keuntunganSetengah.toLocaleString('id-ID')}\n`;
                        output += `Total diterima = ${totalKembali.toLocaleString('id-ID')}`;
                        payout = totalKembali;
                        profit = keuntunganSetengah;
                    }
                }
                else if(d.res.status === 'HALF_LOSE'){
                    if(d.rawOdds < 0){
                        const absOdds = Math.abs(d.rawOdds);
                        const totalBayar = stake * absOdds;
                        const kerugian = totalBayar / 2;
                        const sisaModal = totalBayar - kerugian;
                        const vooranNilai = Math.abs(d.line);
                        const lawanVoor = (d.side === 'home' ? d.away : d.home);
                        output += `Anda KALAH SETENGAH (1/2)\n\n`;
                        output += `Vooran ${vooranNilai} (${vooranNilai}) untuk ${lawanVoor}\n`;
                        output += `Odds MINUS ${d.rawOdds.toFixed(2)} → anda membayar lebih:\n`;
                        output += `${stake.toLocaleString('id-ID')} x ${absOdds.toFixed(2)} = ${totalBayar.toLocaleString('id-ID')}\n`;
                        output += `Karena kalah setengah, kerugian = ${kerugian.toLocaleString('id-ID')}\n`;
                        output += `Sisa modal yang dikembalikan = ${sisaModal.toLocaleString('id-ID')}`;
                        profit = -kerugian;
                        payout = sisaModal;
                    } else {
                        const kerugian = stake / 2;
                        const sisaModal = stake - kerugian;
                        output += `Anda KALAH SETENGAH (1/2)\n\n`;
                        output += `Odds PLUS ${d.rawOdds.toFixed(2)}:\n`;
                        output += `Kerugian = ${kerugian.toLocaleString('id-ID')}\n`;
                        output += `Sisa modal = ${sisaModal.toLocaleString('id-ID')}`;
                        profit = -kerugian;
                        payout = sisaModal;
                    }
                }
            } 
            else {
                // PARLAY (tetap dengan format sebelumnya tanpa emoji)
                output = `=== HASIL PARLAY (${cards.length} TIM) ===\nStake: Rp ${stake.toLocaleString('id-ID')}\n\n`;
                for(let i=0;i<details.length;i++){
                    const d=details[i];
                    const sideName = d.type==='ah' ? (d.side==='home'?d.home:d.away) : (d.type==='1x2' ? (d.side==='home'?d.home:d.side==='away'?d.away:'Draw') : (d.side==='over'?'Over':'Under'));
                    const voor = (d.type==='ah'||d.type==='ou') ? d.line : '';
                    let stat = '';
                    if(d.res.status==='WIN') stat='MENANG PENUH';
                    else if(d.res.status==='LOSE') stat='KALAH';
                    else if(d.res.status==='PUSH') stat='PUSH (SERI)';
                    else if(d.res.status==='HALF_WIN') stat='MENANG SETENGAH';
                    else stat='KALAH SETENGAH';
                    output += `Match ${i+1}: ${d.home} vs ${d.away} (${sideName} ${voor})\nSkor: ${d.hs}-${d.as}\nStatus: ${stat} (${d.res.desc})\n`;
                    if(d.rawOdds<0) output += `konversi odds minus: 1 + (1/${Math.abs(d.rawOdds).toFixed(2)}) = ${d.decOdds.toFixed(4)}\n`;
                    output += `odds : ${d.decOdds.toFixed(3)} dengan status ${d.res.desc}\n`;
                    if(d.res.status==='WIN') output += `menang penuh -> odds efektif = ${d.effOdds.toFixed(4)}\n`;
                    else if(d.res.status==='PUSH') output += `push -> odds efektif = 1.000\n`;
                    else if(d.res.status==='HALF_WIN') output += `menang setengah -> odds efektif = ${d.effOdds.toFixed(4)}\n`;
                    else if(d.res.status==='HALF_LOSE') output += `kalah setengah -> odds efektif = 0.5\n`;
                    else output += `kalah -> odds efektif = 0\n`;
                    output += `\n`;
                }
                const steps = details.map(d=>d.effOdds.toFixed(3)).join(' x ');
                output += `Total odds = ${steps} = ${totalOdds.toFixed(4)}\n`;
                if(profit>0) output += `${totalOdds.toFixed(4)} x ${stake.toLocaleString('id-ID')} = Rp ${Math.round(payout).toLocaleString('id-ID')} (kemenangan + modal)\nKeuntungan bersih = Rp ${Math.round(profit).toLocaleString('id-ID')}`;
                else if(profit<0) output += `Anda kalah sebesar Rp ${Math.abs(Math.round(profit)).toLocaleString('id-ID')}`;
                else output += `Hasil impas (modal kembali)`;
            }
            
            // Update UI
            document.getElementById('resOdds').innerText = totalOdds.toFixed(4);
            document.getElementById('resPayout').innerText = `Rp ${Math.round(payout).toLocaleString()}`;
            document.getElementById('resProfit').innerText = `Rp ${Math.round(profit).toLocaleString()}`;
            document.getElementById('resStake').innerText = `Rp ${stake.toLocaleString()}`;
            document.getElementById('resultTitle').innerHTML = cards.length===1 ? 'HASIL SINGLE BET' : 'HASIL PARLAY';
            
            let htmlDetail = '<div style="font-weight:700;margin-bottom:12px;">RINCIAN PER TARUHAN</div>';
            for(let d of details){
                let sideName = d.type==='ah' ? (d.side==='home'?d.home:d.away) : (d.type==='1x2' ? (d.side==='home'?d.home:d.side==='away'?d.away:'Draw') : (d.side==='over'?'Over':'Under'));
                let voor = (d.type==='ah'||d.type==='ou') ? d.line : '';
                htmlDetail += `<div style="background:rgba(0,0,0,0.3);border-radius:20px;padding:14px;margin-bottom:12px;">
                    <div><b>${d.home} ${d.hs} - ${d.as} ${d.away}</b></div>
                    <div>Taruhan: ${sideName} ${voor} | Odds: ${d.rawOdds.toFixed(2)}</div>
                    <div>Hasil: ${d.res.desc.toUpperCase()} | Odds Efektif: ${d.effOdds.toFixed(4)}</div>
                </div>`;
            }
            htmlDetail += `<div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.2);padding-top:14px;">Total Odds: ${details.map(d=>d.effOdds.toFixed(3)).join(' x ')} = <strong>${totalOdds.toFixed(4)}</strong><br>Payout: Rp ${Math.round(payout).toLocaleString()}<br>Profit: ${profit>=0?`+ ${Math.round(profit).toLocaleString()}`:`- ${Math.abs(Math.round(profit)).toLocaleString()}`}</div>`;
            document.getElementById('stepsDetail').innerHTML = htmlDetail;
            document.getElementById('copyArea').innerText = output;
            document.getElementById('resultBox').classList.add('show');
            if(profit>0) showConfetti();
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }

        function resetAll(){
            document.getElementById('cardsContainer').innerHTML = '';
            cardCounter=0;
            defaultCards.forEach(c=>addCard(c));
            document.getElementById('resultBox').classList.remove('show');
        }
        function copyTxt(){
            const txt = document.getElementById('copyArea').innerText;
            if(!txt.trim()){ showToast('Belum ada hasil hitung'); return; }
            navigator.clipboard.writeText(txt).then(()=>{ showToast('Hasil disalin'); });
        }

        document.getElementById('addBtn').addEventListener('click',()=>addCard());
        document.getElementById('hitBtn').addEventListener('click',hitungSekarang);
        document.getElementById('resetBtn').addEventListener('click',resetAll);
        document.getElementById('copyBtn').addEventListener('click',copyTxt);
        window.onload = ()=>{ defaultCards.forEach(c=>addCard(c)); };
    </script>
</body>
</html>
